<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Email confirmed · Flyeasy</title>
    <meta name="robots" content="noindex" />
    <style>
      :root {
        --page: #ffffff;
        --card: #f5f1e8;
        --ink: #1f2420;
        --slate: #4a5560;
        --green: #5a8a4d;
        --green-dark: #47723c;
        --line: #e6dfce;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        background: var(--page);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 420px;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 40px 28px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(31, 36, 32, 0.06);
      }
      .mark { width: 96px; height: auto; margin: 0 auto 20px; display: block; }
      h1 { font-size: 24px; line-height: 1.2; margin: 0 0 10px; letter-spacing: -0.01em; }
      p { font-size: 15px; line-height: 1.55; color: var(--slate); margin: 0 auto 22px; max-width: 34ch; }
      .btn {
        display: inline-block;
        width: 100%;
        padding: 15px 20px;
        background: var(--green);
        color: #fff;
        font-size: 16px;
        font-weight: 600;
        text-decoration: none;
        border-radius: 14px;
        transition: background 0.15s ease;
      }
      .btn:hover { background: var(--green-dark); }
      .hint { font-size: 13px; color: var(--slate); margin: 16px auto 0; }
      .hint a { color: var(--green); text-decoration: none; }
      .hint a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <main class="card">
      <!-- Flyeasy mark — mirrors components/ui/Mark.tsx (viewBox 0 0 200 176). -->
      <svg class="mark" viewBox="0 0 200 176" role="img" aria-label="Flyeasy">
        <g transform="translate(97.9,75.5)">
          <g transform="translate(-1.3,-1.5) rotate(-42)">
            <path d="M0,-46 L26,34 L0,18 L-26,34 Z" fill="#4a5560" />
            <path d="M0,-46 L0,18 L-26,34 Z" fill="#1f2420" opacity="0.85" />
          </g>
        </g>
        <g transform="translate(102.1,75.5)">
          <g transform="translate(1.3,-1.5) rotate(42) scale(-1,1)">
            <path d="M0,-46 L26,34 L0,18 L-26,34 Z" fill="#5a8a4d" />
            <path d="M0,-46 L0,18 L-26,34 Z" fill="#47723c" />
          </g>
        </g>
        <circle cx="100" cy="26" r="4.5" fill="#1f2420" />
      </svg>

      <h1>Email confirmed</h1>
      <p>You're all set. Head back to the Flyeasy app and log in to get started.</p>

      <a class="btn" href="flyeasy://">Open Flyeasy</a>

      <p class="hint">
        Button didn't work? Just reopen the Flyeasy app on your device.<br />
        Need help? <a href="mailto:support@flyeasytogether.com">support@flyeasytogether.com</a>
      </p>
    </main>
  </body>
</html>
